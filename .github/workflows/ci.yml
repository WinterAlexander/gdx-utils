name: Java CI

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package
        
  build-windows:
    runs-on: windows-latest
    if: false
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package
        
  build-mac:
    runs-on: macos-latest
    if: false
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package

  check-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Set up Clang
        uses: egor-tensin/setup-clang@v2.1
        with:
          version: 21
          platform: x64
      - name: Clone winterfmt
        uses: actions/checkout@v5
        with:
          repository: WinterAlexander/winterfmt
          path: winterfmt
      - name: Check format
        run: |
          source winterfmt/init.sh
          winterfmt check